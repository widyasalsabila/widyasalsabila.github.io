<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Widya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      color:white;
      padding:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .container {
      max-width:600px;
      width:100%;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border-radius:24px;
      padding:30px;
      border:1px solid rgba(255,255,255,0.08);
    }
    h1 { font-size:28px; margin-bottom:20px; }
    ul { list-style:none; }
    li {
      margin-bottom:12px;
      padding:12px 15px;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      transition:0.2s;
    }
    li:hover { background:rgba(255,255,255,0.1); }
    a {
      color:#25D366;
      text-decoration:none;
      font-weight:500;
    }
    .back-link {
      display:inline-block;
      margin-top:20px;
      color:#94a3b8;
      text-decoration:none;
      font-size:14px;
    }
    .back-link:hover { color:white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Semua Postingan</h1>
    <ul>
      <!-- DAFTAR LINK POSTINGAN MULAI DI SINI -->
      <li><a href="posts/post-1.html">Postingan 1: Judul Pertama</a></li>
      <li><a href="posts/post-2.html">Postingan 2: Judul Kedua</a></li>
      <li><a href="posts/post-3.html">Postingan 3: Judul Ketiga</a></li>
      <!-- ... tambahkan sampai postingan ke-40 -->
    </ul>
    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
  </div>
</body>
</html>
